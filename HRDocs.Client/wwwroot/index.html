<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRTS — Document Receiving &amp; Tracking System</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/Radzen.Blazor/css/material-base.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link href="HRDocs.Client.styles.css" rel="stylesheet" />
    <style>
        #blazor-error-ui { display: none; }
        .native-field { margin-bottom: 18px; }
        .native-field label { display: block; margin-bottom: 6px; color: #486581; font-size: 13px; }
        .native-field input { width: 100%; padding: 12px; }
        .validation-message { display: block; color: #b42318; font-size: 12px; margin-top: 4px; }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
    <script src="js/app.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
